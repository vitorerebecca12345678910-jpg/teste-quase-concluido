<!-- ==================== ESTILOS ==================== -->
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #000000, #fffef9);
    color: #fff;
  }

  header {
    background: linear-gradient(135deg, #111111, #fffdfb);
    height: 250px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  header h1 {
    color: #fff;
    font-size: 3em;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
  }

  section h2 {
    color: #ffe066;
    text-align: center;
    margin-bottom: 20px;
    font-size: 2em;
  }

  /* Galeria original */
  .apresentacao-imagens {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }
  .apresentacao-imagens img {
    width: 300px;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .apresentacao-imagens img:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }

  /* Carrossel */
  .carousel {
    position: relative;
    max-width: 800px;
    margin: 40px auto;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  }
  .carousel img {
    width: 100%;
    height: 450px;
    object-fit: cover;
    display: none;
  }
  .carousel img.active {
    display: block;
  }

  .carousel button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    border: none;
    color: #fff;
    font-size: 2em;
    padding: 10px;
    cursor: pointer;
    border-radius: 50%;
  }
  .carousel button:hover {
    background: rgba(0,0,0,0.8);
  }
  .prev { left: 15px; }
  .next { right: 15px; }

  /* Botão de orçamento bem grande */
  .orcamento-grande {
    position: fixed;
    right: 20px;
    bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #25D366;
    color: #000;
    padding: 30px 50px;
    border-radius: 60px;
    font-size: 28px;
    font-weight: bold;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    z-index: 1000;
  }
  .orcamento-grande img {
    width: 50px;
    height: 50px;
    margin-right: 15px;
  }
  
   /* Banner ocupando toda a largura */
  .banner-logo {
    position: relative;
    width: 100%;
    height: 250px;              /* altura do banner */
    overflow: hidden;
  }

  .banner-logo img {
    width: 100%;                /* estica a imagem para ocupar toda a largura */
    height: 100%;               /* estica a imagem para ocupar toda a altura */
    object-fit: cover;          /* mantém proporção sem distorcer */
    filter: brightness(70%);    /* escurece um pouco para destacar o texto */
  }

  /* Texto sobre o banner */
  .banner-text {
    position: absolute;
    top: 50%;                   /* centraliza verticalmente */
    left: 50%;                  /* centraliza horizontalmente */
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 3em;
    font-weight: bold;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
  }

  /* Ajuste do tamanho das imagens do carrossel */
.carousel img {
  width: 100%;        /* ocupa toda a largura do carrossel */
  height: 700px;      /* altura maior para destacar */
  object-fit: cover;  /* mantém proporção sem distorcer */
}

  
</style>

<!-- ==================== SCRIPT CARROSSEL ==================== -->
<script>
  // Função genérica para todos os carrosséis
  document.querySelectorAll(".carousel").forEach(carousel => {
    const images = carousel.querySelectorAll("img");
    const prevBtn = carousel.querySelector(".prev");
    const nextBtn = carousel.querySelector(".next");
    let currentIndex = 0;

    function showImage(index) {
      images.forEach((img, i) => {
        img.classList.toggle("active", i === index);
      });
    }

    prevBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      showImage(currentIndex);
    });

    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      showImage(currentIndex);
    });

    // Troca automática a cada 5 segundos
    setInterval(() => {
      currentIndex = (currentIndex + 1) % images.length;
      showImage(currentIndex);
    }, 5000);
  });
</script>
