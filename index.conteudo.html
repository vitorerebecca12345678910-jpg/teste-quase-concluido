<style>
  .apresentacao-imagens {
  display: flex;          /* coloca lado a lado */
  flex-wrap: wrap;        /* permite quebrar para baixo */
  gap: 20px;              /* espaço entre imagens */
  justify-content: center;/* centraliza na tela */
}

.apresentacao-imagens img {
  width: 300px;           /* largura fixa */
  height: 200px;          /* altura fixa */
  object-fit: cover;      /* corta proporcionalmente sem distorcer */
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}

.apresentacao-imagens img:hover {
  transform: scale(1.05);
}
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #000000, #fffef9); /* degradê vibrante */
  color: #fff;
}

/* Header estilo banner */
header {
  background: linear-gradient(135deg, #111111, #fffdfb);
  height: 250px;
  display: flex;
  align-items: center;
  justify-content: center;
}
header h1 {
  color: #fff;
  font-size: 3em;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
}

/* Seções */
section h2 {
  color: #ffe066; /* dourado suave */
  text-align: center;
  margin-bottom: 20px;
  font-size: 2em;
}

/* Galeria de imagens */
.apresentacao-imagens {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}
.apresentacao-imagens img {
  width: 300px;
  height: 200px;
  object-fit: cover;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  transition: transform 0.3s, box-shadow 0.3s;
}
.apresentacao-imagens img:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* Botão de orçamento */
.orcamento {
  position: fixed;
  top: 70%;
  right: 20px;
  transform: translateY(-50%);
  background: #25D366;
  color: #fff;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  font-size: 1.5em;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
.orcamento a {
  color: #fff;
  text-decoration: none;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}
.orcamento img {
  width: 40px;
  margin-right: 10px;
}

/* Footer */
footer {
  background: linear-gradient(135deg, #000000, #ffffff);
  color: #fff;
  text-align: center;
  padding: 40px;
  font-size: 1.2em;
}

</style>
