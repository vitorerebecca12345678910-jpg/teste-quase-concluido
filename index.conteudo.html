    body {

    header {
      background: #fff;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    header img {
      height: 60px;

    header h1 {

    .hero {

      margin-bottom: 20px;
    }
    .hero p {
      font-size: 1.2em;
      max-width: 600px;
      margin: auto;
    }
    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .galeria img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .galeria img:hover {
      transform: scale(1.05);
    }
    .video {

      padding: 40px 20px;
