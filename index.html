<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Verificação de Idade</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-container {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }
    .form-container h2 {
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Confirmação de Idade</h2>
    <div class="form-group">
      <input type="number" id="idade" placeholder="Digite sua idade">
    </div>
    <button onclick="verificarIdade()">Confirmar</button>
  </div>

  <script>
    function verificarIdade() {
      const idade = parseInt(document.getElementById("idade").value);

      if (!idade) {
        alert("Digite sua idade!");
        return;
      }

      if (idade < 18) {
        alert("Acesso negado: você precisa ter 18 anos ou mais.");
      } else {
        alert("Acesso liberado!");
        window.location.href = "./menu.html";
      }
    }
  </script>
</body>
</html>
