<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navegação com Texto</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000; /* fundo preto */
      text-align: center;
    }
    img {
      width: 100%;
      height: auto; /* mantém proporção da imagem */
      display: block;
    }
    .titulo {
      margin-top: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #fff;
    }
    .titulo a {
      color: #fff;
      text-decoration: none;
      border: 2px solid #fff;
      padding: 10px 20px;
      border-radius: 5px;
      transition: 0.3s;
    }
    .titulo a:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>
<body>
  <!-- Imagem grande não clicável -->
  <img src="./desenvolvedor.jpg" alt="Imagem de destaque">

  <!-- Apenas o texto "Sobre Nós" é clicável -->
  <div class="titulo">
    <a href="./sobre.html">Sobre Nós</a>
    <a href="./contato.html">contato</a>
  </div>
</body>
</html>
