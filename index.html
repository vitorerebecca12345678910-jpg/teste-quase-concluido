<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de Cadastro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 350px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus {
      border-color: #4facfe;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #4facfe;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #030303;
    }
    .error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }
    .link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #4facfe;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Cadastro</h2>
    <form id="cadastroForm">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" required>
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required>
      </div>
      <button type="submit">Cadastrar</button>
      <div class="error" id="erroMsg"></div>
    </form>
    <span class="link" id="esqueciSenha">Esqueci minha senha</span>
  </div>

  <script>
    // Carrega credenciais padrão do localStorage ou usa valores iniciais
    let emailPadrao = localStorage.getItem("emailPadrao") || "teste@exemplo.com";
    let senhaPadrao = localStorage.getItem("senhaPadrao") || "123456";

    const form = document.getElementById('cadastroForm');
    const erroMsg = document.getElementById('erroMsg');
    const esqueciSenha = document.getElementById('esqueciSenha');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      if (email === emailPadrao && senha === senhaPadrao) {
        localStorage.setItem("nomeUsuario", nome);
        localStorage.setItem("emailUsuario", email);
        window.location.href = "./menu.html"; // Redireciona para conteúdo
      } else {
        erroMsg.textContent = "E-mail ou senha inválidos. Use as credenciais corretas.";
      }
    });

    // Redefinir credenciais
    esqueciSenha.addEventListener('click', function() {
      const novoEmail = prompt("Digite o novo e-mail:");
      const novaSenha = prompt("Digite a nova senha:");

      if (novoEmail && novaSenha) {
        localStorage.setItem("emailPadrao", novoEmail);
        localStorage.setItem("senhaPadrao", novaSenha);
        emailPadrao = novoEmail;
        senhaPadrao = novaSenha;
        alert("Credenciais redefinidas com sucesso!");
      }
    });
  </script>




</body>
</html>
